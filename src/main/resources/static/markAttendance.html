<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventVerse | Mark Attendance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #06080f;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 30% 50%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(6,182,212,0.05) 0%, transparent 50%);
            z-index: 0;
        }
        .attendance-card {
            position: relative;
            z-index: 1;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            padding: 40px 36px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        .attendance-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .attendance-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        .attendance-card input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .attendance-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        .attendance-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59,130,246,0.35);
        }
        #result {
            margin-top: 16px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="attendance-card">
    <h2>✅ Mark Attendance</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <button onclick="submitAttendance()">Submit Attendance</button>
    <div id="result"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

function submitAttendance() {
    const username = document.getElementById("username").value;
    if (!username) { document.getElementById("result").textContent = "Please enter your username"; return; }

    fetch("http://192.168.1.8:8080/api/attendance/mark", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username, token: token })
    })
    .then(res => res.text())
    .then(msg => { document.getElementById("result").innerHTML = msg; })
    .catch(err => { document.getElementById("result").textContent = "Error marking attendance"; });
}
</script>
</body>
</html>
